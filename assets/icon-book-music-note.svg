<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c73650"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background with macOS-standard padding -->
  <rect x="40" y="40" width="432" height="432" rx="85" ry="85" fill="url(#bg)"/>

  <!-- Open book -->
  <g transform="translate(256, 295) scale(0.85)">
    <!-- Left page -->
    <path d="M-10,-100 C-10,-100 -30,-110 -120,-110 C-150,-110 -160,-105 -160,-105 L-160,80 C-160,80 -150,75 -120,75 C-30,75 -10,85 -10,85 Z"
          fill="#f0e6d3" stroke="#d4c4a8" stroke-width="3"/>
    <!-- Right page -->
    <path d="M10,-100 C10,-100 30,-110 120,-110 C150,-110 160,-105 160,-105 L160,80 C160,80 150,75 120,75 C30,75 10,85 10,85 Z"
          fill="#f5edd8" stroke="#d4c4a8" stroke-width="3"/>
    <!-- Spine -->
    <line x1="0" y1="-100" x2="0" y2="85" stroke="#d4c4a8" stroke-width="3"/>

    <!-- Text lines on left page -->
    <line x1="-130" y1="-70" x2="-30" y2="-70" stroke="#c4b498" stroke-width="4" stroke-linecap="round"/>
    <line x1="-130" y1="-45" x2="-40" y2="-45" stroke="#c4b498" stroke-width="4" stroke-linecap="round"/>
    <line x1="-130" y1="-20" x2="-35" y2="-20" stroke="#c4b498" stroke-width="4" stroke-linecap="round"/>
    <line x1="-130" y1="5" x2="-45" y2="5" stroke="#c4b498" stroke-width="4" stroke-linecap="round"/>
    <line x1="-130" y1="30" x2="-50" y2="30" stroke="#c4b498" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Musical note (eighth note) -->
  <g transform="translate(325, 165) scale(0.85)">
    <!-- Note stem -->
    <line x1="0" y1="0" x2="0" y2="95" stroke="white" stroke-width="10" stroke-linecap="round"/>
    <!-- Flag -->
    <path d="M0,0 C30,15 35,40 10,60" stroke="white" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Note head -->
    <ellipse cx="-12" cy="95" rx="22" ry="16" transform="rotate(-20, -12, 95)" fill="white"/>
  </g>
</svg>
